<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Run - Running Quest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        .run-body { background: #0f172a; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .run-header { padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); }
        .run-content { flex: 1; display: flex; flex-direction: column; }
        .map-container { flex: 1; min-height: 40vh; background: #333; z-index: 1; }
        .stats-panel { padding: 2rem; background: #1e293b; border-top-left-radius: 20px; border-top-right-radius: 20px; margin-top: -20px; z-index: 2; position: relative; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); text-align: center; }
        .live-stats { display: flex; justify-content: space-around; margin-bottom: 2rem; }
        .live-stat h2 { font-size: 3rem; margin: 0; font-weight: 800; color: #38bdf8; }
        .live-stat p { font-size: 1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 0.5rem; }
        .controls { display: flex; justify-content: center; gap: 1.5rem; }
        .btn-control { border: none; border-radius: 50px; padding: 1rem 3rem; font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: transform 0.2s; text-transform: uppercase; }
        .btn-control:hover { transform: scale(1.05); }
        .btn-start { background: #22c55e; color: white; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
        .btn-pause { background: #eab308; color: white; box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4); display: none; }
        .btn-stop { background: #ef4444; color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); display: none; }
    </style>
</head>
<body class="run-body">
    <div class="run-header">
        <div class="logo" style="font-weight:800; color:#38bdf8;">Running Quest</div>
        <a href="{{ url_for('dashboard') }}" style="color:white; text-decoration:none;">Cancel</a>
    </div>

    <div class="run-content">
        <div id="map" class="map-container"></div>
        
        <div class="stats-panel">
            <div class="live-stats">
                <div class="live-stat">
                    <h2 id="distanceDisplay">0.00</h2>
                    <p>Kilometers</p>
                </div>
                <div class="live-stat">
                    <h2 id="timeDisplay">00:00</h2>
                    <p>Time</p>
                </div>
                <div class="live-stat">
                    <h2 id="capturesDisplay">0</h2>
                    <p>Captures</p>
                </div>
            </div>
            
            <div class="controls">
                <button id="startBtn" class="btn-control btn-start">Start</button>
                <button id="pauseBtn" class="btn-control btn-pause">Pause</button>
                <button id="stopBtn" class="btn-control btn-stop">Finish & Save</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Geohash JS -->
    <script src="https://cdn.jsdelivr.net/npm/latlon-geohash@2.0.0/latlon-geohash.min.js"></script>
    <script src="{{ url_for('static', filename='js/run_tracker.js') }}"></script>
</body>
</html>
