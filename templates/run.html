{% extends 'base.html' %}
{% block head %}
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        .run-wrapper {
            width: 100%;
            height: calc(100vh - 120px);
            display: flex;
            gap: 2rem;
            position: relative;
        }
        #map {
            flex-grow: 1;
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }
        .stats-panel {
            width: 300px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .live-stat {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .live-stat h2 {
            font-size: 2.5rem;
            margin-bottom: 0.25rem;
            color: var(--primary);
        }
        .live-stat p {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: auto;
        }
    </style>
{% endblock %}
{% block content %}
<div class="run-wrapper">
    <div class="stats-panel">
        <h2 style="text-align: center; margin-bottom: 1rem;">Live Telemetry</h2>
        <div class="live-stat">
            <h2 id="distanceDisplay">0.00</h2>
            <p>Kilometers</p>
        </div>
        <div class="live-stat">
            <h2 id="timeDisplay">00:00</h2>
            <p>Time</p>
        </div>
        <div class="live-stat">
            <h2 id="capturesDisplay">0</h2>
            <p>Captures</p>
        </div>
        
        <div class="controls">
            <button id="startBtn" class="btn btn-primary pulse-glow">START RUN</button>
            <button id="pauseBtn" class="btn btn-outline" style="display:none; border-color: #f59e0b; color: #f59e0b;">Pause</button>
            <button id="stopBtn" class="btn btn-danger" style="display:none;">Finish & Save</button>
        </div>
    </div>
    
    <div id="map"></div>
</div>
{% endblock %}
{% block scripts %}
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Geohash JS -->
    <script src="https://cdn.jsdelivr.net/npm/latlon-geohash@2.0.0/latlon-geohash.min.js"></script>
    <script src="{{ url_for('static', filename='js/run_tracker.js') }}"></script>
{% endblock %}
