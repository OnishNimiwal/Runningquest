<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Quest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <nav style="text-align: right; margin-bottom: 20px;">
                {% if current_user.is_authenticated %}
                    <span>Hi, {{ current_user.username }}!</span>
                    <a href="{{ url_for('logout') }}" style="margin-left: 10px;">Logout</a>
                {% else %}
                    <a href="{{ url_for('login') }}">Login</a>
                    <a href="{{ url_for('register') }}" style="margin-left: 10px;">Register</a>
                {% endif %}
            </nav>
            <h1>Welcome to Running Quest</h1>
            <p>Your journey to better running starts here.</p>
        </header>
        <main>
            <section class="hero">
                <h2>Track, Improve, Conquer.</h2>
                <p>Features coming soon: Activity tracking, personalized goals, and more!</p>
            </section>
        </main>
    </div>
</body>
</html>
