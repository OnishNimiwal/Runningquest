{% extends 'base.html' %}
{% block content %}
<div class="hero-container">
    <div class="grid-background"></div>
    <h1 class="hero-title">Run to Conquer Your City</h1>
    <p class="hero-subtitle">Turn your daily runs into a massive multiplayer turf war. Claim your grid. Defend your territory. Become a legend.</p>
    <div style="display: flex; gap: 1rem; justify-content: center;">
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('run_tracker') }}" class="btn btn-primary pulse-glow" style="font-size: 1.25rem; padding: 1rem 2.5rem;">Start Running</a>
        {% else %}
            <a href="{{ url_for('register') }}" class="btn btn-primary pulse-glow" style="font-size: 1.25rem; padding: 1rem 2.5rem;">Join the War</a>
        {% endif %}
    </div>
</div>
{% endblock %}
